<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Bunny Hide and Seek</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #000;
    }

    #overlay {
      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 10;
      width: 320px;
      padding: 16px;
      border-radius: 16px;
      color: white;
      background: rgba(15, 23, 42, 0.75);
      backdrop-filter: blur(8px);
      font-size: 14px;
      line-height: 1.45;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .small {
      color: #cbd5e1;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <div id="overlay">
    <h1>🐰 AR Bunny Hide & Seek</h1>
    <div class="small">
      Quest 3: press ENTER AR.<br />
      Player A: short press trigger to move bunny.<br />
      Hold trigger for 2 seconds to hide.<br />
      Player B: follow the 3D distance and direction hint.
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
