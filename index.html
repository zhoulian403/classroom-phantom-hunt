<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Bunny Hide and Seek</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #111827;
    }

    #hud {
      position: absolute;
      top: 20px;
      left: 20px;
      width: 340px;
      z-index: 10;
      color: white;
      background: rgba(15, 23, 42, 0.88);
      padding: 18px;
      border-radius: 18px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }

    button {
      margin: 5px 4px;
      padding: 11px 13px;
      border: none;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      background: #2563eb;
      cursor: pointer;
    }

    #confirmButton {
      background: #16a34a;
    }

    #searchButton {
      background: #f97316;
    }

    #resetButton {
      background: #dc2626;
    }

    #status, #distance, #direction {
      margin-top: 10px;
      font-weight: bold;
    }

    #tip {
      margin-top: 12px;
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.4;
    }
  </style>
</head>

<body>
  <div id="hud">
    <h1>🐰 AR Bunny Hide & Seek</h1>

    <button onclick="setMode('hider')">Player A: Hide</button>
    <button id="confirmButton" onclick="confirmHide()">Confirm Hide</button>
    <button id="searchButton" onclick="setMode('seeker')">Player B: Search</button>
    <button id="resetButton" onclick="resetGame()">Reset</button>

    <div id="status">Status: Enter AR first.</div>
    <div id="distance">Distance: --</div>
    <div id="direction">Direction: --</div>

    <div id="tip">
      Quest 3: open this page in Meta Quest Browser, press ENTER AR, then use the controller trigger.
      <br />
      Player A places the bunny. Player B searches using distance and direction hints.
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
